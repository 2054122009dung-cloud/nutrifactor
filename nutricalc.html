<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriMap Ultimate Dashboard - Dark Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="fooddata.js"></script>

<div class="container">
    <h1>🥩 NutriMap Ultimate</h1>
    
    <div class="input-section">
        <select id="foodSelect"></select> 
        
        <input type="number" id="foodWeight" placeholder="Gram/ml" value="100" min="1">
        <button onclick="addFood()">Add into consumption - Thêm Vào Khẩu Phần</button>
    </div>

    <div class="selected-list" id="selectedList"></div>

    <div class="summary-cards">
        <div class="card">
            <h3>Tổng Calo</h3>
            <div class="val" id="sumCal">0 kcal</div>
        </div>
        <div class="card">
            <h3>Protein</h3>
            <div class="val" id="sumPro">0 g</div>
        </div>
        <div class="card">
            <h3>Fat</h3>
            <div class="val" id="sumFat">0 g</div>
        </div>
        <div class="card">
            <h3>Tỉ lệ Na:K <span style="font-size: 11px; color: var(--text-muted)">(Tốt < 1)</span></h3>
            <div class="val" id="naKRatio">0.00</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel" id="panelMacros"></div>
        <div class="panel" id="panelEAA"></div>
        <div class="panel" id="panelMinerals"></div>
        <div class="panel" id="panelVitWater"></div>
        <div class="panel" id="panelVitFat"></div>
    </div>
<div class="auto-menu-panel" style="background: var(--bg-panel); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    <h3>🤖 Trợ Lý Tạo Menu Tự Động / AI Auto Menu Generator</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 10px;">
        <input type="number" id="targetCal" placeholder="Calorie Goal (VD: 2000)" style="padding: 8px; width: 180px;">
        <input type="number" id="targetPro" placeholder="Protein Goal (g) (VD: 150)" style="padding: 8px; width: 180px;">
        
        <select id="menuGoal" style="padding: 8px;">
            <option value="muscle">💪 Muscle Building (Leucine, BCAA)</option>
            <option value="strength">🏋️ Strength & Endurance (Creatine, Carbs)</option>
            <option value="energy">🧠 Energy & Focus (Omega 3, B12, Caffeine)</option>
            <option value="height">🦴 Bone Growth (Calcium, Vit D, Phosphorus)</option>
        </select>
        
        <button onclick="generateAutoMenu()" style="padding: 8px 15px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer;">
            ✨ Tạo Menu / Generate Menu
        </button>
    </div>
</div>

<div class="panel evaluation-panel" id="panelEvaluation">
    <h2>⚕️ Báo Cáo & Khuyến Nghị / Analysis & Recommendations</h2>
    <ul class="eval-list" id="evalList">
        <li class="success-text">Hãy thêm thức ăn để hệ thống phân tích dữ liệu. / Please add food to start analysis.</li>
    </ul>
</div>

<script>

    const metricsConfig = [

        { idx: 41, name: 'Caffeine', target: 400, unit: 'mg', panel: 'panelVitWater', isInverse: true },

        { idx: 40, name: 'Omega 3', target: 1000, unit: 'mg', panel: 'panelVitFat' },
        { idx: 13, name: 'Vitamin A', target: 3000, unit: 'IU', panel: 'panelVitFat' },

        { idx: 24, name: 'Vitamin E', target: 15, unit: 'mg', panel: 'panelVitFat' },

    const healthConsequences = {

            '<br>🇬🇧 <i>EN: Prone to inflammation, joint pain, memory decline, and increased cardiovascular risks. Combine with: Vitamin E. Maintain a good ratio against Omega 6.</i>',
            
        'Caffeine':
            '⚠️ Vượt mức an toàn 400mg/ngày gây mất ngủ, nhịp tim đập nhanh, lo âu, rối loạn tiêu hóa và lệ thuộc thần kinh. ' +
            '<br>💡 <b>Lưu ý:</b> Nên giới hạn mức nạp và kết hợp L-Theanine (có trong trà) để giảm bớt sự bồn chồn (jitters) của Caffeine. ' +
            '<br>🇬🇧 <i>EN: Exceeding safe limit (400mg) causes insomnia, tachycardia, anxiety, and dependence. Combine with: L-Theanine to smooth out jitters.</i>'

    let currentMeal = [];

    // HÀM MỚI ĐƯỢC THÊM VÀO ĐỂ LOAD DANH SÁCH MÓN ĂN VÀO THẺ <select>
    function initFoodOptions() {
        const select = document.getElementById('foodSelect');
        // Duyệt qua tất cả các key trong db
        for (const [key, value] of Object.entries(db)) {
            const option = document.createElement('option');
            option.value = key;
            option.textContent = value.name;
            select.appendChild(option);
        }
    }

    function addFood() {
        const key = document.getElementById('foodSelect').value;
        const weight = parseFloat(document.getElementById('foodWeight').value);
        if (!weight || weight <= 0) return;
        currentMeal.push({ id: Date.now(), key, weight });
        updateUI();
    }

    function removeFood(id) {
        currentMeal = currentMeal.filter(item => item.id !== id);
        updateUI();
    }

    function calculateTotal(idx) {
        return currentMeal.reduce((sum, item) => {
            return sum + (db[item.key].data[idx] * item.weight / 100);
        }, 0);
    }
// Hàm tự động tìm top 2 thực phẩm giàu một vi chất cụ thể nhất
    function getTopFoodsForNutrient(nutrientIdx, limit = 2) {
        let foodsList = [];
        for (const [key, value] of Object.entries(db)) {
            const amount = value.data[nutrientIdx];
            if (amount > 0) {
                foodsList.push({ name: value.name, amount: amount });
            }
        }
        // Sắp xếp giảm dần (món nào nhiều chất đó nhất xếp lên đầu)
        foodsList.sort((a, b) => b.amount - a.amount);
        return foodsList.slice(0, limit);
    }
    function updateUI() {
        const listDiv = document.getElementById('selectedList');
        listDiv.innerHTML = '';
        currentMeal.forEach(item => {
            const tag = document.createElement('div');
            tag.className = 'food-tag';
            tag.innerHTML = `${db[item.key].name} (${item.weight}g/ml) <button onclick="removeFood(${item.id})">×</button>`;
            listDiv.appendChild(tag);
        });

        if(currentMeal.length === 0) {
            document.getElementById('evalList').innerHTML = '<li class="success-text">Hãy thêm thức ăn để xem đánh giá hệ thống.</li>';
        }

        const tCal = calculateTotal(0);
        const tNa = calculateTotal(29);
        const tK = calculateTotal(28);
        const tCaffeine = calculateTotal(41); // Thêm biến bắt Caffeine
        const ratio = tK > 0 ? (tNa / tK).toFixed(2) : 0;

        document.getElementById('sumCal').innerText = tCal.toFixed(0) + ' kcal';
        document.getElementById('sumPro').innerText = calculateTotal(1).toFixed(1) + ' g';
        document.getElementById('sumFat').innerText = calculateTotal(2).toFixed(1) + ' g';
        
        const ratioEl = document.getElementById('naKRatio');
        if(ratioEl) { // Đảm bảo phần tử tồn tại trước khi cập nhật
            ratioEl.innerText = ratio;
            ratioEl.className = `val ${ratio > 1 ? 'warning' : 'good'}`;
        }

        const panels = { 
            panelMacros: '<h2>🍞 Carb & Sugar (Càng thấp càng tốt)</h2>',
            panelEAA: '<h2>🧬 EAA & Hợp Chất</h2>', 
            panelMinerals: '<h2>🪨 Khoáng Chất</h2>', 
            panelVitWater: '<h2>💧 Vitamins & Stimulants (Nước)</h2>', 
            panelVitFat: '<h2>🥑 Vitamins & Lipids (Dầu)</h2>' 
        };
        
        let warningsList = [];
        let missingList = [];

        if (tNa > 2000) {
            warningsList.push(`<li class="danger-text">⚠️ <strong>Thừa Natri (${tNa.toFixed(0)}mg):</strong> Gây tích nước, tăng huyết áp.</li>`);
        }
        if (tCaffeine > 400) {
            warningsList.push(`<li class="danger-text">⚠️ <strong>Quá liều Caffeine (${tCaffeine.toFixed(0)}mg):</strong> ${healthConsequences['Caffeine']}</li>`);
        }

        metricsConfig.forEach(m => {
            const total = calculateTotal(m.idx);
            let score = 0, percentage = 0, barClass = 'progress-bar-fill';

            if (m.isInverse) {
                percentage = Math.min(100, (total / m.target) * 100);
                if (total <= m.target) {
                    score = 10;
                } else {
                    score = Math.max(0, 10 - ((total - m.target) / (m.target * 0.5)) * 10);
                    barClass += ' danger';
                }
            } else {
                score = Math.min(10, (total / m.target) * 10);
                percentage = Math.min(100, (total / m.target) * 100);
                if (score >= 9.9) barClass += ' maxed';
                if (currentMeal.length > 0 && percentage < 50) {
                    // Thêm idx: m.idx vào object
                    missingList.push({ idx: m.idx, name: m.name, pct: percentage, msg: healthConsequences[m.name] || 'Ảnh hưởng trao đổi chất.' });
                }
            }

            panels[m.panel] += `
                <div class="nutrient-item">
                    <div class="nutrient-header">
                        <span class="nutrient-name">${m.name} <span class="unit">${total.toFixed(1)} / ${m.target} ${m.unit}</span></span>
                        <span class="nutrient-score" style="color: ${score >= 9 ? 'var(--success)' : (m.isInverse && total > m.target ? 'var(--danger)' : 'var(--text-muted)')}">${score.toFixed(1)}/10</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="${barClass}" style="width: ${percentage}%"></div>
                    </div>
                </div>`;
        });

        // Kiểm tra phần tử tồn tại trước khi cập nhật HTML
        ['panelMacros', 'panelEAA', 'panelMinerals', 'panelVitWater', 'panelVitFat'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.innerHTML = panels[id];
        });

        if (currentMeal.length > 0) {
            missingList.sort((a,b) => a.pct - b.pct);
            
            missingList.forEach(item => { 
                // Gọi hàm tìm món ăn (Lấy top 2 món)
                const topFoods = getTopFoodsForNutrient(item.idx, 2);
                let foodSuggestHtml = '';
                
                // Nếu tìm thấy món ăn phù hợp trong DB, tạo chuỗi HTML
                if (topFoods.length > 0) {
                    const foodNames = topFoods.map(f => f.name).join(', ');
                    foodSuggestHtml = `<div style="margin-top: 5px; color: var(--success); font-size: 14px;">
                                        🥘 <b>Nên ăn thêm:</b> ${foodNames}
                                       </div>`;
                }

                warningsList.push(`<li>🔍 <strong>Thiếu ${item.name} (${item.pct.toFixed(0)}%):</strong> ${item.msg} ${foodSuggestHtml}</li>`);
            });
            
            const evalDiv = document.getElementById('evalList');
            if(evalDiv) evalDiv.innerHTML = warningsList.length > 0 ? warningsList.join('') : '<li class="success-text">Tuyệt vời! Khẩu phần hiện tại rất cân bằng.</li>';
        }
    }
    
    // Khởi tạo danh sách món ăn trước
    initFoodOptions();
    // Gọi hàm update UI lần đầu để render khung dữ liệu
    updateUI();
    // Hàm tự động thiết kế menu
// Khởi tạo biến toàn cục để theo dõi chu kỳ bấm nút và thông số cũ
if (typeof window.menuCycleIndex === 'undefined') {
    window.menuCycleIndex = 0;
    window.lastGenParams = "";
}

function generateAutoMenu() {
    const targetCal = parseFloat(document.getElementById('targetCal').value);
    const targetPro = parseFloat(document.getElementById('targetPro').value);
    const goal = document.getElementById('menuGoal').value;

    if (!targetCal || !targetPro) {
        alert('Vui lòng nhập đầy đủ Mục tiêu Calo và Protein!');
        return;
    }

    if (targetPro * 4 > targetCal) {
        alert('Cảnh báo: Lượng Protein yêu cầu lớn hơn tổng Calo cho phép. Không thể thực hiện!');
        return;
    }

    // CƠ CHẾ CYCLING (LUÂN PHIÊN MENU)
    const currentParams = `${targetCal}_${targetPro}_${goal}`;
    if (window.lastGenParams === currentParams) {
        window.menuCycleIndex = (window.menuCycleIndex + 1) % 3; 
    } else {
        window.menuCycleIndex = 0; 
        window.lastGenParams = currentParams;
    }

    currentMeal = [];

    // Bổ sung trọng số cho 'endurance' nếu DB của bạn hỗ trợ
    const goalWeights = {
        'strength': { 3: 10, 1: 5, 37: 2, 29: 1 }, 
        'endurance': { 3: 10, 40: 10, 1: 5, 41: 5 }, // Ví dụ: Ưu tiên Carb và Năng lượng
        'energy': { 40: 10, 21: 10, 41: 5, 31: 2 }, 
        'height': { 26: 10, 23: 10, 30: 5, 1: 3 },  
        'muscle': { 4: 10, 5: 5, 6: 5, 1: 5 }       
    }[goal] || { 1: 1 };

    let foods = Object.keys(db).map(key => {
        let score = 0;
        for (let idx in goalWeights) {
            score += (db[key].data[idx] || 0) * goalWeights[idx];
        }

        let nameLower = db[key].name.toLowerCase();
        
        // Phân loại mảng đồ uống & supplements cực kỳ chi tiết
        let isWhey = /(whey|isolate|powder)/i.test(nameLower);
        let isCaffeine = /(cafe|coffee|trà|tea|monster|redbull|energy|bò húc|pre-workout)/i.test(nameLower);
        let isMilk = /(sữa|milk)/i.test(nameLower) && !isWhey;
        let isCreatine = /(creatine)/i.test(nameLower);
        let isVitB = /(vitamin b|b-complex|b12|b6|b1)/i.test(nameLower);
        
        // Phân loại Nguồn Carb Tốt
        let isHighCarb = /(cơm|gạo|bánh mì|khoai|yến mạch|chuối|oat|pasta|mì|phở|bún)/i.test(nameLower) && !isWhey;

        let isDrink = db[key].isDrink || isWhey || isCaffeine || isMilk || isCreatine || isVitB || /(nước|sinh tố|juice)/i.test(nameLower);

        return { 
            key: key, 
            score: score, 
            cal: db[key].data[0], 
            pro: db[key].data[1],
            name: db[key].name,
            isDrink: isDrink,
            isWhey: isWhey,
            isCaffeine: isCaffeine,
            isMilk: isMilk,
            isCreatine: isCreatine,
            isVitB: isVitB,
            isHighCarb: isHighCarb
        };
    });

    // Mảng đã sort từ xịn nhất xuống kém nhất
    foods.sort((a, b) => b.score - a.score);

    // Tách riêng đồ ăn đặc (Solid) để chạy thuật toán lấp đầy
    let solidFoods = foods.filter(f => !f.isDrink);

    let currentSumCal = 0;
    let currentSumPro = 0;

    const addPortion = (foodKey, weight) => {
        if(weight <= 0) return;
        let existing = currentMeal.find(i => i.key === foodKey);
        if (existing) {
            existing.weight += weight;
        } else {
            currentMeal.push({ id: Date.now() + Math.random(), key: foodKey, weight: weight });
        }
    };

    // ==========================================
    // BƯỚC 0: ADD ĐỒ UỐNG & SUPPLEMENTS (SLOT CHUYÊN DỤNG)
    // ==========================================

    // Slot 1: BẢO HIỂM WHEY (Luôn luôn 1 scoop ~ 30g)
    let wheyFoods = foods.filter(f => f.isWhey);
    if (wheyFoods.length > 0) {
        let wIdx = window.menuCycleIndex % wheyFoods.length;
        let bestWhey = wheyFoods[wIdx];
        let wheyGrams = 30; 
        let wheyCal = (bestWhey.cal * wheyGrams) / 100;
        
        if (currentSumCal + wheyCal <= targetCal) {
            addPortion(bestWhey.key, wheyGrams);
            currentSumPro += (bestWhey.pro * wheyGrams) / 100;
            currentSumCal += wheyCal;
        }
    }

    // Slot 2: BẢO HIỂM CREATINE (Dành cho Strength & Endurance - 5g tiêu chuẩn)
    if (goal === 'strength' || goal === 'endurance') {
        let creaFoods = foods.filter(f => f.isCreatine);
        if (creaFoods.length > 0) {
            let bestCrea = creaFoods[0]; // Creatine thường không cần cycle
            let creaGrams = 5;
            let creaCal = (bestCrea.cal * creaGrams) / 100;
            addPortion(bestCrea.key, creaGrams);
            currentSumPro += (bestCrea.pro * creaGrams) / 100;
            currentSumCal += creaCal;
        }
    }

    // Slot 3: BẢO HIỂM CAFFEINE (Kích thích thần kinh cho Strength/Endurance/Energy)
    if (['strength', 'endurance', 'energy'].includes(goal)) {
        let cafFoods = foods.filter(f => f.isCaffeine);
        if (cafFoods.length > 0) {
            let cIdx = window.menuCycleIndex % cafFoods.length;
            let bestCaf = cafFoods[cIdx];
            
            // Endurance/Energy cần tỉnh táo lâu dài nên dùng lượng lớn hơn (500ml), Strength dùng liều kích thích nhanh (250ml)
            let cafGrams = (goal === 'energy' || goal === 'endurance') ? 500 : 250; 
            let cafCal = (bestCaf.cal * cafGrams) / 100;
            
            if (currentSumCal + cafCal <= targetCal + 50) { 
                addPortion(bestCaf.key, cafGrams);
                currentSumPro += (bestCaf.pro * cafGrams) / 100;
                currentSumCal += cafCal;
            }
        }
    }

    // Slot 4: BẢO HIỂM VITAMIN B (Dành cho Endurance & Energy để chuyển hoá năng lượng)
    if (goal === 'endurance' || goal === 'energy') {
        let vitBFoods = foods.filter(f => f.isVitB);
        if (vitBFoods.length > 0) {
            let bestVitB = vitBFoods[0];
            let vitBGrams = 5; // Giả sử 1 serving là viên/gói 5g
            let vitBCal = (bestVitB.cal * vitBGrams) / 100;
            addPortion(bestVitB.key, vitBGrams);
            currentSumPro += (bestVitB.pro * vitBGrams) / 100;
            currentSumCal += vitBCal;
        }
    }

    // Slot 5: BẢO HIỂM CHIỀU CAO (Sữa cho mục tiêu Height)
    if (goal === 'height') {
        let milkFoods = foods.filter(f => f.isMilk);
        if (milkFoods.length > 0) {
            let mIdx = window.menuCycleIndex % milkFoods.length;
            let bestMilk = milkFoods[mIdx];
            let milkGrams = 250;
            let milkCal = (bestMilk.cal * milkGrams) / 100;
            
            if (currentSumCal + milkCal <= targetCal) {
                addPortion(bestMilk.key, milkGrams);
                currentSumPro += (bestMilk.pro * milkGrams) / 100;
                currentSumCal += milkCal;
            }
        }
    }

    // ==========================================
    // BƯỚC 0.5: FILL NỀN TẢNG CARB CHẤT LƯỢNG CAO (Cho Strength/Endurance)
    // ==========================================
    // Nếu là sức mạnh/sức bền, ta buộc phải cắm 1 lượng Carb (Khoai/Cơm/Yến mạch) vào trước khi thuật toán chia bài Protein chạy
    if (goal === 'strength' || goal === 'endurance') {
        let carbFoods = solidFoods.filter(f => f.isHighCarb);
        if (carbFoods.length > 0) {
            let cbIdx = window.menuCycleIndex % carbFoods.length;
            let bestCarb = carbFoods[cbIdx];
            
            // Fix mặc định 150g - 200g carb nền tảng
            let carbGrams = 200; 
            let carbCal = (bestCarb.cal * carbGrams) / 100;
            
            if (currentSumCal + carbCal <= targetCal * 0.7) { // Chừa room cho protein
                addPortion(bestCarb.key, carbGrams);
                currentSumPro += (bestCarb.pro * carbGrams) / 100;
                currentSumCal += carbCal;
            }
        }
    }

    // ==========================================
    // BƯỚC A: LẤP ĐẦY PROTEIN (THUẬT TOÁN CHIA BÀI)
    // ==========================================
    let topSolidFoods = [];
    // Lọc bỏ bớt các nguồn thuần Carb ở Bước A để ưu tiên thịt/cá
    let proteinFocusedSolids = solidFoods.filter(f => goal === 'strength' || goal === 'endurance' ? !f.isHighCarb : true);

    for (let i = 0; i < proteinFocusedSolids.length; i++) {
        if (i % 3 === window.menuCycleIndex) {
            topSolidFoods.push(proteinFocusedSolids[i]);
        }
        if (topSolidFoods.length === 5) break; 
    }

    for (let food of topSolidFoods) {
        if (currentSumPro >= targetPro || currentSumCal >= targetCal) break;
        if (food.pro <= 0 || food.cal <= 0) continue; 

        let remainingPro = targetPro - currentSumPro;
        let remainingCal = targetCal - currentSumCal;

        let gramsForPro = (remainingPro / food.pro) * 100;
        let gramsForCal = (remainingCal / food.cal) * 100;
        
        let maxGrams = Math.min(gramsForPro, gramsForCal, 300);
        let addGrams = Math.floor(maxGrams / 10) * 10;

        if (addGrams > 0) {
            addPortion(food.key, addGrams);
            currentSumPro += (food.pro * addGrams) / 100;
            currentSumCal += (food.cal * addGrams) / 100;
        }
    }

    // ==========================================
    // BƯỚC B: BÙ ĐẮP CALO CÒN THIẾU
    // ==========================================
    if (currentSumCal < targetCal - 50) { 
        let allHighCalSolids = [...solidFoods].sort((a, b) => b.cal - a.cal);
        let highCalSolids = [];
        
        for (let i = 0; i < allHighCalSolids.length; i++) {
            if (i % 3 === window.menuCycleIndex) {
                highCalSolids.push(allHighCalSolids[i]);
            }
        }
        
        for (let food of highCalSolids) {
            if (currentSumCal >= targetCal) break;
            if (food.cal <= 0) continue;

            let remainingCal = targetCal - currentSumCal;
            let neededGrams = (remainingCal / food.cal) * 100;
            
            let addGrams = Math.min(neededGrams, 100);
            addGrams = Math.floor(addGrams / 10) * 10;

            if (addGrams > 0) {
                addPortion(food.key, addGrams);
                currentSumPro += (food.pro * addGrams) / 100;
                currentSumCal += (food.cal * addGrams) / 100;
            }
        }
    }

    updateUI();
}
</script>
