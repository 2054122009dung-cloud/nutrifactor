<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriMap Ultimate Dashboard - Dark Edition</title>
    <style>
        :root {
            /* Dark Theme Colors */
            --bg-color: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #334155;
            --progress-bg: #334155;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        h2, h3 {
            margin-bottom: 15px;
            color: var(--text-main);
        }

        /* Input Section */
        .input-section {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input[type="number"], button {
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background-color: #0f172a;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        select { flex: 1; min-width: 250px; }
        input[type="number"] { width: 120px; }
        
        button {
            background: linear-gradient(135deg, var(--primary), #1e40af);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        /* Selected Foods List */
        .selected-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .food-tag {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary);
            color: #60a5fa;
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
            animation: fadeIn 0.3s ease-out;
        }

        .food-tag button {
            background: none;
            box-shadow: none;
            color: var(--danger);
            border: none;
            padding: 0;
            font-size: 18px;
            cursor: pointer;
        }
        .food-tag button:hover { transform: scale(1.2); }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card h3 { margin-bottom: 8px; font-size: 16px; color: var(--text-muted); }
        .card .val { font-size: 28px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .card .warning { color: var(--danger); text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .card .good { color: var(--success); text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .panel h2 {
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nutrient-item { margin-bottom: 15px; }

        .nutrient-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .nutrient-name { font-weight: 600; color: #e2e8f0; }
        .nutrient-score { font-weight: bold; }

        .progress-bar-bg {
            background-color: var(--progress-bg);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .progress-bar-fill.maxed {
            background: linear-gradient(90deg, #059669, var(--success));
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
        
        .progress-bar-fill.danger {
            background: linear-gradient(90deg, #b91c1c, var(--danger));
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .unit { font-size: 12px; color: var(--text-muted); font-weight: normal; margin-left: 5px; }

        /* Evaluation Panel */
        .evaluation-panel {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-left: 4px solid var(--warning);
        }
        .evaluation-panel h2 { color: var(--warning); border-bottom-color: rgba(245, 158, 11, 0.3); }
        .eval-list { list-style: none; }
        .eval-list li {
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 15px;
            color: #cbd5e1;
                line-height: 1.6;
        }
        
        .eval-list li strong { color: var(--text-main); }
        .eval-list .danger-text strong { color: var(--danger); }
        .eval-list .success-text { color: var(--success); font-weight: bold; text-align: center; padding: 15px;}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    // HÀM MỚI ĐƯỢC THÊM VÀO ĐỂ LOAD DANH SÁCH MÓN ĂN VÀO THẺ <select>
    function initFoodOptions() {
        const select = document.getElementById('foodSelect');
        // Duyệt qua tất cả các key trong db
        for (const [key, value] of Object.entries(db)) {
            const option = document.createElement('option');
            option.value = key;
            option.textContent = value.name;
            select.appendChild(option);
        }
    }

    function addFood() {
        const key = document.getElementById('foodSelect').value;
        const weight = parseFloat(document.getElementById('foodWeight').value);
        if (!weight || weight <= 0) return;
        currentMeal.push({ id: Date.now(), key, weight });
        updateUI();
    }

    function removeFood(id) {
        currentMeal = currentMeal.filter(item => item.id !== id);
        updateUI();
    }

    function calculateTotal(idx) {
        return currentMeal.reduce((sum, item) => {
            return sum + (db[item.key].data[idx] * item.weight / 100);
        }, 0);
    }
// Hàm tự động tìm top 2 thực phẩm giàu một vi chất cụ thể nhất
    function getTopFoodsForNutrient(nutrientIdx, limit = 2) {
        let foodsList = [];
        for (const [key, value] of Object.entries(db)) {
            const amount = value.data[nutrientIdx];
            if (amount > 0) {
                foodsList.push({ name: value.name, amount: amount });
            }
        }
        // Sắp xếp giảm dần (món nào nhiều chất đó nhất xếp lên đầu)
        foodsList.sort((a, b) => b.amount - a.amount);
        return foodsList.slice(0, limit);
    }

                if (score >= 9.9) barClass += ' maxed';
                if (currentMeal.length > 0 && percentage < 50) {
                    // Thêm idx: m.idx vào object
                    missingList.push({ idx: m.idx, name: m.name, pct: percentage, msg: healthConsequences[m.name] || 'Ảnh hưởng trao đổi chất.' });
                }
            }

            panels[m.panel] += `
                <div class="nutrient-item">
                    <div class="nutrient-header">
                        <span class="nutrient-name">${m.name} <span class="unit">${total.toFixed(1)} / ${m.target} ${m.unit}</span></span>
                        <span class="nutrient-score" style="color: ${score >= 9 ? 'var(--success)' : (m.isInverse && total > m.target ? 'var(--danger)' : 'var(--text-muted)')}">${score.toFixed(1)}/10</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="${barClass}" style="width: ${percentage}%"></div>
                    </div>
                </div>`;
        });

        // Kiểm tra phần tử tồn tại trước khi cập nhật HTML
        ['panelMacros', 'panelEAA', 'panelMinerals', 'panelVitWater', 'panelVitFat'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.innerHTML = panels[id];
        });

        if (currentMeal.length > 0) {
            missingList.sort((a,b) => a.pct - b.pct);
            
            missingList.forEach(item => { 
                // Gọi hàm tìm món ăn (Lấy top 2 món)
                const topFoods = getTopFoodsForNutrient(item.idx, 2);
                let foodSuggestHtml = '';
                
                // Nếu tìm thấy món ăn phù hợp trong DB, tạo chuỗi HTML
                if (topFoods.length > 0) {
                    const foodNames = topFoods.map(f => f.name).join(', ');
                    foodSuggestHtml = `<div style="margin-top: 5px; color: var(--success); font-size: 14px;">
                                        🥘 <b>Nên ăn thêm:</b> ${foodNames}
                                       </div>`;
                }

                warningsList.push(`<li>🔍 <strong>Thiếu ${item.name} (${item.pct.toFixed(0)}%):</strong> ${item.msg} ${foodSuggestHtml}</li>`);
            });
            
            const evalDiv = document.getElementById('evalList');
            if(evalDiv) evalDiv.innerHTML = warningsList.length > 0 ? warningsList.join('') : '<li class="success-text">Tuyệt vời! Khẩu phần hiện tại rất cân bằng.</li>';
        }
    }
    
    // Khởi tạo danh sách món ăn trước
    initFoodOptions();
    // Gọi hàm update UI lần đầu để render khung dữ liệu
    updateUI();
</script>
